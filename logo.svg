<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Glass morphism effect -->
    <filter id="glassmorphism">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.85" />
      </feComponentTransfer>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Radial gradient for depth -->
    <radialGradient id="depthGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#c5ebc3;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#54414e;stop-opacity:0.1" />
    </radialGradient>

    <!-- Linear gradient for accent -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5ebc3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#875c74;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle with glass effect -->
  <circle cx="100" cy="100" r="95" fill="#54414e" opacity="0.15" />
  <circle cx="100" cy="100" r="90" fill="url(#depthGradient)" filter="url(#glassmorphism)" />
  
  <!-- Outer border with muted palette -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#a790a5" stroke-width="1.5" opacity="0.4" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="#c5ebc3" stroke-width="0.5" opacity="0.2" />

  <!-- QR Code Grid Pattern - stylized -->
  <g id="qr-grid" filter="url(#glow)">
    <!-- Top-left finder pattern -->
    <rect x="38" y="38" width="8" height="8" fill="#c5ebc3" opacity="0.9" />
    <rect x="40" y="40" width="4" height="4" fill="#54414e" />
    <rect x="32" y="32" width="20" height="20" fill="none" stroke="#a790a5" stroke-width="1" opacity="0.5" />

    <!-- Top-right finder pattern -->
    <rect x="154" y="38" width="8" height="8" fill="#c5ebc3" opacity="0.9" />
    <rect x="156" y="40" width="4" height="4" fill="#54414e" />
    <rect x="148" y="32" width="20" height="20" fill="none" stroke="#a790a5" stroke-width="1" opacity="0.5" />

    <!-- Bottom-left finder pattern -->
    <rect x="38" y="154" width="8" height="8" fill="#c5ebc3" opacity="0.9" />
    <rect x="40" y="156" width="4" height="4" fill="#54414e" />
    <rect x="32" y="148" width="20" height="20" fill="none" stroke="#a790a5" stroke-width="1" opacity="0.5" />

    <!-- QR data pattern - subtle grid -->
    <g opacity="0.4">
      <rect x="68" y="68" width="4" height="4" fill="#b7c8b5" />
      <rect x="78" y="68" width="4" height="4" fill="#b7c8b5" />
      <rect x="88" y="68" width="4" height="4" fill="#b7c8b5" />
      
      <rect x="68" y="78" width="4" height="4" fill="#b7c8b5" />
      <rect x="88" y="78" width="4" height="4" fill="#b7c8b5" />
      
      <rect x="68" y="88" width="4" height="4" fill="#b7c8b5" />
      <rect x="78" y="88" width="4" height="4" fill="#b7c8b5" />
      <rect x="88" y="88" width="4" height="4" fill="#b7c8b5" />
    </g>
  </g>

  <!-- Central scanner symbol - concentric circles with gradient -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.7" />
  <circle cx="100" cy="100" r="20" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5" />
  <circle cx="100" cy="100" r="12" fill="url(#accentGradient)" opacity="0.6" filter="url(#glow)" />

  <!-- Corner accent elements -->
  <line x1="70" y1="70" x2="80" y2="70" stroke="#c5ebc3" stroke-width="1.5" opacity="0.6" />
  <line x1="70" y1="75" x2="70" y2="85" stroke="#c5ebc3" stroke-width="1.5" opacity="0.6" />
  
  <line x1="130" y1="70" x2="120" y2="70" stroke="#c5ebc3" stroke-width="1.5" opacity="0.6" />
  <line x1="130" y1="75" x2="130" y2="85" stroke="#c5ebc3" stroke-width="1.5" opacity="0.6" />
  
  <line x1="70" y1="130" x2="80" y2="130" stroke="#c5ebc3" stroke-width="1.5" opacity="0.6" />
  <line x1="70" y1="125" x2="70" y2="115" stroke="#c5ebc3" stroke-width="1.5" opacity="0.6" />
  
  <line x1="130" y1="130" x2="120" y2="130" stroke="#c5ebc3" stroke-width="1.5" opacity="0.6" />
  <line x1="130" y1="125" x2="130" y2="115" stroke="#c5ebc3" stroke-width="1.5" opacity="0.6" />
</svg>